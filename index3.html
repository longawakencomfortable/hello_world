<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>별사탕 자유비행 게임</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden;
        }
        canvas {
            background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
            border: 4px solid #fff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="500"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // 게임 상태 변수
    let score = 0;
    let lives = 3;
    let lastEatenColor = null;
    let gameOver = false;
    let frameCount = 0;

    // 6가지 색상 정의
    const COLORS = [
        { name: "빨강", hex: "#FF595E" },
        { name: "주황", hex: "#FF924C" },
        { name: "노랑", hex: "#FFCA3A" },
        { name: "초록", hex: "#8AC926" },
        { name: "파랑", hex: "#1982C4" },
        { name: "보라", hex: "#6A4C93" }
    ];

    // 6가지 색상이므로 인덱스 + 3이 보색(위험 색상)
    function getDangerIndex(index) {
        return (index + 3) % 6;
    }

    // 키 입력 상태
    const keys = {
        ArrowUp: false,
        ArrowDown: false,
        ArrowLeft: false,
        ArrowRight: false
    };

    window.addEventListener('keydown', (e) => {
        if (e.code === 'ArrowUp') keys.ArrowUp = true;
        if (e.code === 'ArrowDown') keys.ArrowDown = true;
        if (e.code === 'ArrowLeft') keys.ArrowLeft = true;
        if (e.code === 'ArrowRight') keys.ArrowRight = true;

        // 브라우저 스크롤 방지
        if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
            e.preventDefault();
        }
    });

    window.addEventListener('keyup', (e) => {
        if (e.code === 'ArrowUp') keys.ArrowUp = false;
        if (e.code === 'ArrowDown') keys.ArrowDown = false;
        if (e.code === 'ArrowLeft') keys.ArrowLeft = false;
        if (e.code === 'ArrowRight') keys.ArrowRight = false;
    });

    // 플레이어 객체 (귀여운 캐릭터)
    const player = {
        x: 100,
        y: 250,
        width: 40,
        height: 40,
        vx: 0,
        vy: 0,
        speed: 1.5,
        friction: 0.85,

        update() {
            // 상하좌우 이동
            if (keys.ArrowUp) this.vy -= this.speed;
            if (keys.ArrowDown) this.vy += this.speed;
            if (keys.ArrowLeft) this.vx -= this.speed;
            if (keys.ArrowRight) this.vx += this.speed;

            // 마찰력 적용 (부드러운 감속)
            this.vx *= this.friction;
            this.vy *= this.friction;

            this.x += this.vx;
            this.y += this.vy;

            // 화면 이탈 방지 (상하좌우 모두)
            if (this.x < 0) {
                this.x = 0;
                this.vx = 0;
            } else if (this.x + this.width > canvas.width) {
                this.x = canvas.width - this.width;
                this.vx = 0;
            }
            
            if (this.y < 0) {
                this.y = 0;
                this.vy = 0;
            } else if (this.y + this.height > canvas.height) {
                this.y = canvas.height - this.height;
                this.vy = 0;
            }
        },

        draw() {
            // 캐릭터 몸통 (하얀 둥근 찹쌀떡 모양)
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(this.x + this.width / 2, this.y + this.height / 2, this.width / 2, 0, Math.PI * 2);
            ctx.fill();

            // 귀
            ctx.beginPath();
            ctx.arc(this.x + this.width / 2 - 10, this.y, 8, 0, Math.PI * 2);
            ctx.arc(this.x + this.width / 2 + 10, this.y, 8, 0, Math.PI * 2);
            ctx.fill();

            // 눈
            ctx.fillStyle = "#000000";
            ctx.beginPath();
            ctx.arc(this.x + this.width / 2 - 8, this.y + this.height / 2 - 2, 2.5, 0, Math.PI * 2);
            ctx.arc(this.x + this.width / 2 + 8, this.y + this.height / 2 - 2, 2.5, 0, Math.PI * 2);
            ctx.fill();

            // 볼터치
            ctx.fillStyle = "#FFB6C1";
            ctx.beginPath();
            ctx.arc(this.x + this.width / 2 - 12, this.y + this.height / 2 + 5, 4, 0, Math.PI * 2);
            ctx.arc(this.x + this.width / 2 + 12, this.y + this.height / 2 + 5, 4, 0, Math.PI * 2);
            ctx.fill();
        }
    };

    // 별사탕 배열
    const candies = [];

    // 별 모양 그리기 함수
    function drawStar(cx, cy, spikes, outerRadius, innerRadius, color) {
        let rot = Math.PI / 2 * 3;
        let x = cx;
        let y = cy;
        let step = Math.PI / spikes;

        ctx.beginPath();
        ctx.moveTo(cx, cy - outerRadius);
        for (let i = 0; i < spikes; i++) {
            x = cx + Math.cos(rot) * outerRadius;
            y = cy + Math.sin(rot) * outerRadius;
            ctx.lineTo(x, y);
            rot += step;

            x = cx + Math.cos(rot) * innerRadius;
            y = cy + Math.sin(rot) * innerRadius;
            ctx.lineTo(x, y);
            rot += step;
        }
        ctx.lineTo(cx, cy - outerRadius);
        ctx.closePath();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#ffffff";
        ctx.stroke();
        ctx.fillStyle = color;
        ctx.fill();
    }

    function updateCandies() {
        // 별사탕 생성
        if (frameCount % 60 === 0) {
            // 화면 전체 높이에 랜덤하게 생성
            const yPos = Math.random() * (canvas.height - 40) + 20; 
            const colorIdx = Math.floor(Math.random() * 6);
            candies.push({
                x: canvas.width + 20,
                y: yPos,
                radius: 15,
                colorIndex: colorIdx,
                speed: 3 + Math.random() * 2
            });
        }

        // 별사탕 이동 및 충돌 체크
        for (let i = candies.length - 1; i >= 0; i--) {
            let c = candies[i];
            c.x -= c.speed; // 횡스크롤 효과

            // 충돌 감지 (원과 원의 거리 계산)
            let dx = (player.x + player.width / 2) - c.x;
            let dy = (player.y + player.height / 2) - c.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < player.width / 2 + c.radius) {
                // 별사탕 먹음
                if (lastEatenColor !== null) {
                    let dangerIndex = getDangerIndex(lastEatenColor);
                    if (c.colorIndex === dangerIndex) {
                        lives--; // 보색(위험 색상)을 먹었을 때 생명 감소
                    } else {
                        score += 10;
                    }
                } else {
                    score += 10;
                }
                
                lastEatenColor = c.colorIndex;
                candies.splice(i, 1);
                
                if (lives <= 0) gameOver = true;
                continue;
            }

            // 화면 밖으로 나간 별사탕 제거
            if (c.x + c.radius < 0) {
                candies.splice(i, 1);
            }
        }
    }

    function drawCandies() {
        candies.forEach(c => {
            drawStar(c.x, c.y, 5, c.radius, c.radius / 2, COLORS[c.colorIndex].hex);
        });
    }

    // UI 그리기 (바닥 제거)
    function drawUI() {
        // UI 텍스트
        ctx.fillStyle = "#333";
        ctx.font = "bold 20px Arial";
        ctx.textAlign = "left";
        ctx.fillText(`점수: ${score}`, 20, 30);
        
        let hearts = "";
        for(let i=0; i<lives; i++) hearts += "❤️";
        ctx.fillText(`생명: ${hearts}`, 20, 60);

        // 이전 색상 안내 (위험 색상 힌트 제거)
        if (lastEatenColor !== null) {
            ctx.fillStyle = "#333";
            ctx.fillText(`최근 먹은 색:`, 20, 90);
            
            // 최근 색상 동그라미 표시
            ctx.fillStyle = COLORS[lastEatenColor].hex;
            ctx.beginPath();
            ctx.arc(150, 83, 12, 0, Math.PI*2);
            ctx.fill();
            
            // 테두리
            ctx.lineWidth = 2;
            ctx.strokeStyle = "#fff";
            ctx.stroke();
        }
    }

    // 메인 게임 루프
    function gameLoop() {
        if (gameOver) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            ctx.font = "bold 40px Arial";
            ctx.textAlign = "center";
            ctx.fillText("게임 오버!", canvas.width / 2, canvas.height / 2 - 20);
            ctx.font = "20px Arial";
            ctx.fillText(`최종 점수: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
            ctx.fillText("새로고침(F5)하여 다시 시작하세요", canvas.width / 2, canvas.height / 2 + 60);
            return;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        player.update();
        player.draw();
        
        updateCandies();
        drawCandies();
        
        drawUI();

        frameCount++;
        requestAnimationFrame(gameLoop);
    }

    // 게임 시작
    gameLoop();
</script>

</body>
</html>
